<h2 data-de="05. Forschung (Tech Center)" data-en="05. Research (Tech Center)">05. Forschung (Tech Center)</h2>

<div class="card">
    <h3 data-de="Die Forschungs-Priorität" data-en="Research Priority">Die Forschungs-Priorität</h3>
    <p data-de="Forschung ist ein Marathon, kein Sprint. Wer hier stoppt, verliert den Anschluss." 
       data-en="Research is a marathon, not a sprint. If you stop here, you fall behind."></p>
    
    <ul>
        <li data-de="<strong>Entwicklung:</strong> Maximiere 'Bau' und 'Forschungsschub' zuerst." data-en="<strong>Development:</strong> Maximize 'Construction' and 'Research Speed' first."></li>
        <li data-de="<strong>Wirtschaft:</strong> Fokus auf Gold-Produktion, da dies im Late-Game zum Flaschenhals wird." data-en="<strong>Economy:</strong> Focus on Gold production as it becomes the bottleneck in late-game."></li>
    </ul>
</div>

<div class="card alert">
    <h3 data-de="Der Special Forces Grind" data-en="The Special Forces Grind">Der Special Forces Grind</h3>
    <p data-de="Ab HQ 25 wird 'Special Forces' (Spezialeinheiten) zur wichtigsten Forschung. Sie schaltet T10 Truppen frei. Bereite dich auf Monate an Forschungszeit vor!" 
       data-en="From HQ 25, 'Special Forces' becomes the most important research. It unlocks T10 troops. Prepare for months of research time!"></p>
</div>

<div class="card">
    <h3 data-de="Truppen-Counter" data-en="Troop Counters">Truppen-Counter</h3>
    <p data-de="Vergiss nicht die individuellen Forschungsbäume für Panzer, Raketen und Flugzeuge. Panzer dominieren die Meta, aber Flugzeuge kontern Panzer!" 
       data-en="Don't forget individual research trees for Tanks, Missiles, and Aircraft. Tanks dominate the meta, but Aircraft counter Tanks!"></p>
</div>
