<h2 data-de="17. Strategie-Kalkulatoren" data-en="17. Strategy Calculators">17. Strategie-Kalkulatoren</h2>

<div class="card">
    <h3 data-de="UR-Helden Splitter Rechner" data-en="UR Hero Shard Calculator">UR-Helden Splitter Rechner</h3>
    <p data-de="Berechne, wie viele UR-Splitter du noch bis zum nächsten Star-Level benötigst." 
       data-en="Calculate how many UR shards you need for the next star level."></p>
    
    <div style="background: #0d0f11; padding: 15px; border-radius: 5px; border: 1px solid var(--dim);">
        <label data-de="Aktuelle Sterne:" data-en="Current Stars:">Aktuelle Sterne:</label><br>
        <select id="shard-target" style="width:100%; padding:8px; margin: 10px 0; background: #161b22; color: white; border: 1px solid var(--primary);">
            <option value="100">3 ⭐ (Benötigt 100)</option>
            <option value="300">4 ⭐ (Benötigt 300 gesamt)</option>
            <option value="800">5 ⭐ (Benötigt 800 gesamt)</option>
        </select>
        <button onclick="calcShards()" style="width:100%; padding:10px; background: var(--primary); color: black; border: none; font-weight: bold; cursor: pointer;">CALCULATE</button>
        <p id="calc-result" style="margin-top: 15px; color: var(--accent); font-weight: bold;"></p>
    </div>
</div>

<script>
    function calcShards() {
        const val = document.getElementById('shard-target').value;
        const msgDe = `Du benötigst insgesamt ${val} Splitter für dieses Ziel.`;
        const msgEn = `You need a total of ${val} shards for this target.`;
        
        // Wir nutzen die globale Variable currentLang aus der index.html
        document.getElementById('calc-result').innerText = (typeof currentLang !== 'undefined' && currentLang === 'en') ? msgEn : msgDe;
    }
</script>
