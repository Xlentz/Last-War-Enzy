<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last War Enzy – by XLentz</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-dark: #0d0f11;
            --bg-panel: #161b22;
            --primary: #4ade80; 
            --accent: #fbbf24;  
            --text: #e2e8f0;
            --dim: #64748b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* HEADER & NAV */
        header {
            background: var(--bg-panel);
            padding: 15px;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            color: var(--primary);
            font-weight: bold;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* CONTENT AREA */
        #content {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* CARDS & UI ELEMENTS */
        .card {
            background: var(--bg-panel);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .card h3 {
            margin-top: 0;
            color: var(--accent);
            border-bottom: 1px solid #30363d;
            padding-bottom: 10px;
        }

        .alert {
            border-left: 4px solid var(--danger);
        }

        /* SIDE MENU */
        #sideMenu {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--bg-panel); border-right: 2px solid var(--primary);
            transition: 0.3s; z-index: 1000; overflow-y: auto; padding-top: 60px;
        }
        #sideMenu.open { left: 0; }
        
        .menu-item {
            padding: 12px 20px; border-bottom: 1px solid #30363d; cursor: pointer;
            display: block; color: var(--text); text-decoration: none;
        }
        .menu-item:hover { background: #1f242c; color: var(--primary); }

        .submenu { display: none; background: #0d1117; }
        .submenu.open { display: block; }
        .submenu .menu-item { padding-left: 40px; font-size: 0.9rem; }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; z-index: 999;
        }

        /* BUTTONS */
        .btn {
            background: none; border: 1px solid var(--primary); color: var(--primary);
            padding: 8px 15px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem;
        }
        .btn:active { background: var(--primary); color: black; }

        table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.85rem; }
        th, td { border: 1px solid #30363d; padding: 8px; text-align: left; }
        th { background: #1f242c; color: var(--primary); }

        .signature { text-align: center; font-size: 0.7rem; color: var(--dim); margin-top: 40px; }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleMenu(false)"></div>

<header>
    <button class="btn" onclick="toggleMenu(true)">MENU</button>
    <div class="logo">LAST WAR ENZY</div>
    <button id="langBtn" class="btn" onclick="toggleLang()">DE</button>
</header>

<nav id="sideMenu">
    <a class="menu-item" onclick="loadContent('home')">01. Home</a>
    <a class="menu-item" onclick="loadContent('basics')">02. Grundlagen</a>
    <a class="menu-item" onclick="loadContent('heroes')">03. Helden & Meta</a>
    <a class="menu-item" onclick="loadContent('build')">04. Gebäude</a>
    
    <div class="menu-item" onclick="toggleSubmenu('subS1', this)">10. Season 1 (S1) ▼</div>
    <div id="subS1" class="submenu">
        <a class="menu-item" onclick="loadAndScroll('s1', 'intro')">10.1 Map & Überblick</a>
        <a class="menu-item" onclick="loadAndScroll('s1', 'mechanics')">10.2 Mechaniken</a>
        <a class="menu-item" onclick="loadAndScroll('s1', 'strategy')">10.3 Strategien</a>
    </div>

    <div class="menu-item" onclick="toggleSubmenu('subS2', this)">11. Season 2 (S2) ▼</div>
    <div id="subS2" class="submenu">
        <a class="menu-item" onclick="loadAndScroll('s2', 'intro')">11.1 Map & Überblick</a>
        <a class="menu-item" onclick="loadAndScroll('s2', 'mechanics')">11.2 Mechaniken</a>
        <a class="menu-item" onclick="loadAndScroll('s2', 'strategy')">11.4 Events</a>
    </div>

    <a class="menu-item" onclick="loadContent('calc')" style="color: var(--accent);">09. Kalkulatoren</a>
</nav>

<main id="content">
    </main>

<script>
    let currentLang = 'de';

    // HAUPTFUNKTION ZUM LADEN DER INHALTE
    async function loadContent(moduleName) {
        try {
            const response = await fetch(`content-${moduleName}.html`);
            if (!response.ok) throw new Error('File not found');
            
            const html = await response.text();
            const contentDiv = document.getElementById('content');
            
            // 1. HTML einfügen
            contentDiv.innerHTML = html;

            // 2. SKRIPTE AKTIVIEREN (Wichtig für Kalkulatoren!)
            const scripts = contentDiv.querySelectorAll('script');
            scripts.forEach(oldScript => {
                const newScript = document.createElement('script');
                newScript.text = oldScript.text;
                if (oldScript.src) newScript.src = oldScript.src;
                document.body.appendChild(newScript);
                document.body.removeChild(newScript); // Sofort reinigen
            });

            // 3. UI Updates
            updateLanguage();
            toggleMenu(false);
            window.scrollTo(0, 0);

        } catch (error) {
            console.error('Error loading content:', error);
            document.getElementById('content').innerHTML = `<div class="card"><p style="color: var(--danger)">Fehler beim Laden von: content-${moduleName}.html</p></div>`;
        }
    }

    // SCROLL-HELFER FÜR ANCHOR LINKS
    async function loadAndScroll(moduleName, elementId) {
        await loadContent(moduleName);
        setTimeout(() => {
            const el = document.getElementById(elementId);
            if(el) {
                const y = el.getBoundingClientRect().top + window.scrollY - 80;
                window.scrollTo({top: y, behavior: 'smooth'});
            }
        }, 300);
    }

    function toggleMenu(forceState) {
        const m = document.getElementById('sideMenu');
        const o = document.getElementById('overlay');
        const isOpening = forceState !== undefined ? forceState : !m.classList.contains('open');
        
        if(isOpening) { m.classList.add('open'); o.style.display = 'block'; }
        else { m.classList.remove('open'); o.style.display = 'none'; }
    }

    function toggleSubmenu(id, el) {
        document.getElementById(id).classList.toggle('open');
        el.innerText = el.innerText.includes('▼') ? el.innerText.replace('▼', '▲') : el.innerText.replace('▲', '▼');
    }

    function toggleLang() {
        currentLang = currentLang === 'de' ? 'en' : 'de';
        document.getElementById('langBtn').innerText = currentLang.toUpperCase();
        updateLanguage();
    }

    function updateLanguage() {
        document.querySelectorAll('[data-de]').forEach(el => {
            el.innerText = el.getAttribute(`data-${currentLang}`);
        });
        // Speziell für Platzhalter in Kalkulatoren
        document.querySelectorAll('input[data-de-placeholder]').forEach(el => {
            el.placeholder = el.getAttribute(`data-${currentLang}-placeholder`);
        });
    }

    // Initiale Seite laden
    window.onload = () => loadContent('home');

</script>
</body>
</html>
