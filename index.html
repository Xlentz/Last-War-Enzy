<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last War Enzy – by XLentz</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body class="dark-mode">

    <header>
        <div class="logo">LAST WAR ENZY <span class="author">by XLentz</span></div>
        <div class="controls">
            <button id="lang-switch">EN</button>
            <input type="text" id="global-search" placeholder="Suche Strategie...">
        </div>
    </header>

    <main id="app-content">
        <section id="hero-section">
            <h2 data-i18n="hero_title">Helden-Zentrale</h2>
            <div class="grid" id="hero-grid">
                </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button onclick="navigate('hq')" class="active">HQ-Center</button>
        <button onclick="navigate('heroes')">Barracks</button>
        <button onclick="navigate('war')">War Room</button>
        <button onclick="navigate('calc')">Tactics</button>
    </nav>

    <footer class="signature">©XLentz - Fan Project</footer>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
