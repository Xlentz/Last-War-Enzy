<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Last War Enzy – by XLentz</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-dark: #0d0f11;
            --bg-panel: #161b22;
            --primary: #4ade80; 
            --accent: #fbbf24;  
            --text: #e2e8f0;
            --dim: #64748b;
            --danger: #ef4444;
            --font-size-base: 16px;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            overflow-x: hidden;
            line-height: 1.5;
            font-size: var(--font-size-base);
        }

        /* BOOT SCREEN */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .boot-loader {
            width: 120px; height: 120px; border-radius: 25%;
            border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.6; } 50% { transform: scale(1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.6; } }

        /* HEADER */
        header {
            background: var(--bg-panel); padding: 10px 15px; border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000; height: 50px;
        }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .header-logo { width: 30px; height: 30px; border-radius: 5px; border: 1px solid var(--primary); }
        .logo-text { font-weight: bold; letter-spacing: 1px; color: var(--primary); font-size: 0.85em; text-transform: uppercase; }

        .header-controls { display: flex; align-items: center; gap: 8px; }
        .font-btn-head { background: #1f2937; border: 1px solid var(--primary); color: var(--primary); cursor: pointer; padding: 4px 8px; font-size: 0.7rem; font-weight: bold; border-radius: 3px; }
        #langBtn { background: none; border: 1px solid var(--primary); color: var(--primary); padding: 4px 8px; cursor: pointer; font-size: 0.7rem; font-weight: bold; border-radius: 3px; min-width: 35px; }

        /* SIDE MENU */
        #sideMenu {
            position: fixed; left: -300px; top: 0; width: 280px; height: 100%;
            background: var(--bg-panel); z-index: 2000; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-right: 1px solid var(--primary); overflow-y: auto; padding: 10px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            visibility: hidden; /* Komplett ausgeblendet */
        }
        #sideMenu.open { left: 0; visibility: visible; }
        
        .search-box { background: #0d0f11; border: 1px solid var(--dim); border-radius: 4px; padding: 8px; margin-bottom: 15px; display: flex; align-items: center; }
        .search-box input { background: none; border: none; color: white; width: 100%; outline: none; font-size: 0.8em; }

        .menu-item { padding: 10px; border-bottom: 1px solid #2d3748; cursor: pointer; font-size: 0.85em; text-transform: uppercase; font-weight: bold; }
        .menu-item:hover { color: var(--primary); background: #1f2937; }
        
        .menu-toggle::after { content: ' ▼'; font-size: 0.6em; float: right; color: var(--dim); }
        .menu-toggle.open::after { content: ' ▲'; color: var(--primary); }
        
        .submenu { display: none; background: #0a0c0e; border-left: 2px solid var(--primary); margin-left: 5px; }
        .submenu.open { display: block; }
        .submenu-item { padding: 8px 15px; font-size: 0.8em; color: var(--dim); cursor: pointer; border-bottom: 1px solid #1a202c; }
        .submenu-item:hover { color: var(--primary); background: #161b22; }

        /* CONTENT AREA */
        .container { padding: 15px; max-width: 800px; margin: auto; min-height: 70vh; }
        #dynamic-content { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: rgba(22, 27, 34, 0.9); border-left: 4px solid var(--primary); padding: 15px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .signature { text-align: center; font-size: 0.65em; color: var(--dim); margin-top: 30px; border-top: 1px dotted var(--dim); padding-top: 10px; }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: var(--bg-panel);
            display: flex; justify-content: space-around; padding: 8px 0;
            border-top: 2px solid var(--primary); z-index: 1000;
        }
        .nav-btn { color: var(--dim); font-size: 0.7em; text-align: center; cursor: pointer; flex: 1; }
        .nav-btn.active { color: var(--primary); }
        .nav-icon { font-size: 1.2em; display: block; margin-bottom: 2px; }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1500; backdrop-filter: blur(3px); }
        .spinner { border: 3px solid rgba(74, 222, 128, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 50px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="boot-screen">
    <img src="apple-touch-icon.png" class="boot-loader" onerror="this.src='https://via.placeholder.com/150/000000/4ade80?text=LW'">
    <p style="color: var(--primary); margin-top: 20px; font-family: monospace; letter-spacing: 3px; font-size: 0.7rem;">SYSTEM LOADING...</p>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="sideMenu">
    <div class="search-box">
        <input type="text" id="menuSearch" placeholder="SUCHEN / SEARCH..." onkeyup="filterMenu()">
    </div>

    <div class="menu-item" onclick="loadContent('home')">01. Home</div>
    <div class="menu-item" onclick="loadContent('basics')">02. Grundlagen</div>
    <div class="menu-item" onclick="loadContent('heroes')">03. Helden</div>
    <div class="menu-item" onclick="loadContent('build')">04. Gebäude</div>
    <div class="menu-item" onclick="loadContent('alliance')">05. Allianz</div>
    <div class="menu-item" onclick="loadContent('combat')">06. Kampf-Taktik</div>
    <div class="menu-item" onclick="loadContent('tips')">07. Tipps & Tricks</div>
    <div class="menu-item" onclick="loadContent('events')">08. Events</div>
    <div class="menu-item" onclick="loadContent('shops')">09. Shops</div>

    <div id="season-menus"></div>

    <div class="menu-item" onclick="loadContent('offseason')">16. Nebensaison</div>
    <div class="menu-item" onclick="loadContent('calc')">17. Kalkulatoren</div>
    <div class="menu-item" onclick="loadContent('gear')">18. Ausrüstung</div>
    <div class="menu-item" onclick="loadContent('faq')">19. FAQ / Updates</div>
</div>

<header>
    <div onclick="toggleMenu()" style="cursor:pointer; font-size: 1.4rem; color: var(--primary);">☰</div>
    <div class="logo-box">
        <img src="apple-touch-icon.png" class="header-logo" alt="Logo">
        <div class="logo-text">LAST WAR ENZY – BY XLENTZ</div>
    </div>
    <div class="header-controls">
        <button class="font-btn-head" onclick="adjustFont(-1)">A-</button>
        <button class="font-btn-head" onclick="adjustFont(1)">A+</button>
        <button onclick="toggleLang()" id="langBtn">EN</button>
    </div>
</header>

<div class="container">
    <div id="dynamic-content"></div>
</div>

<nav class="bottom-nav">
    <div class="nav-btn active" id="nav-home" onclick="loadContent('home')">
        <span class="nav-icon">🏠</span><span data-de="START" data-en="HOME">START</span>
    </div>
    <div class="nav-btn" onclick="toggleMenu()">
        <span class="nav-icon">📂</span><span data-de="MENÜ" data-en="MENU">MENÜ</span>
    </div>
    <div class="nav-btn" id="nav-calc" onclick="loadContent('calc')">
        <span class="nav-icon">📊</span><span>CALC</span>
    </div>
</nav>

<script>
    let currentLang = 'de';
    let fontSize = 16;
    const seasons = [
        { id: 's1', nr: '10', name: 'Season 1' },
        { id: 's2', nr: '11', name: 'Season 2' },
        { id: 's3', nr: '12', name: 'Season 3' },
        { id: 's4', nr: '13', name: 'Season 4' },
        { id: 's5', nr: '14', name: 'Season 5' },
        { id: 's6', nr: '15', name: 'Season 6' }
    ];

    window.addEventListener('DOMContentLoaded', () => {
        initSeasons();
        loadContent('home');
        setTimeout(() => {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('boot-screen').style.display = 'none'; }, 500);
        }, 1000);
    });

    function initSeasons() {
        const container = document.getElementById('season-menus');
        seasons.forEach(s => {
            container.innerHTML += `
                <div class="menu-item menu-toggle" onclick="toggleSubmenu('sub-${s.id}', this)">${s.nr}. ${s.name}</div>
                <div id="sub-${s.id}" class="submenu">
                    <div class="submenu-item" onclick="loadAndScroll('${s.id}', 'intro')">→ Map & Überblick</div>
                    <div class="submenu-item" onclick="loadAndScroll('${s.id}', 'mechanics')">→ Mechaniken & Ressourcen</div>
                    <div class="submenu-item" onclick="loadAndScroll('${s.id}', 'exclusive')">→ Helden / Waffen / Bau</div>
                    <div class="submenu-item" onclick="loadAndScroll('${s.id}', 'strategy')">→ Events & Strategien</div>
                    <div class="submenu-item" onclick="loadAndScroll('${s.id}', 'alliance')">→ Allianz & Hive Tipps</div>
                    <div class="submenu-item" onclick="loadAndScroll('${s.id}', 'end')">→ Saison-Abschluss</div>
                </div>`;
        });
    }

    async function loadContent(moduleName) {
        const contentDiv = document.getElementById('dynamic-content');
        contentDiv.innerHTML = '<div class="spinner"></div>';
        updateNavState(moduleName);

        try {
            const response = await fetch(`content-${moduleName}.html`);
            if (!response.ok) throw new Error('Missing');
            contentDiv.innerHTML = await response.text();
        } catch (err) {
            contentDiv.innerHTML = `
                <div class="card" style="text-align:center;">
                    <img src="apple-touch-icon.png" style="width:60px; opacity:0.2; margin-bottom:15px;">
                    <h2 data-de="In Bearbeitung" data-en="Under Construction">In Bearbeitung</h2>
                    <p data-de="Das Modul <b>content-${moduleName}.html</b> wird derzeit erstellt." 
                       data-en="The module <b>content-${moduleName}.html</b> is currently being developed."></p>
                </div>`;
        }
        updateTexts();
        if (window.innerWidth < 900) toggleMenu(false);
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function toggleMenu(state) {
        const m = document.getElementById('sideMenu');
        const o = document.getElementById('overlay');
        const isOpen = state !== undefined ? state : !m.classList.contains('open');
        m.classList.toggle('open', isOpen);
        o.style.display = isOpen ? 'block' : 'none';
    }

    function toggleSubmenu(id, el) {
        document.getElementById(id).classList.toggle('open');
        el.classList.toggle('open');
    }

    function filterMenu() {
        let input = document.getElementById('menuSearch').value.toUpperCase();
        let items = document.querySelectorAll('.menu-item');
        items.forEach(item => {
            item.style.display = item.innerText.toUpperCase().includes(input) ? "block" : "none";
        });
    }

    function adjustFont(delta) {
        fontSize += delta;
        document.documentElement.style.setProperty('--font-size-base', fontSize + 'px');
    }

    function toggleLang() {
        currentLang = currentLang === 'de' ? 'en' : 'de';
        document.getElementById('langBtn').innerText = currentLang.toUpperCase();
        updateTexts();
    }

    function updateTexts() {
        document.querySelectorAll('[data-de]').forEach(el => {
            el.innerHTML = el.getAttribute('data-' + currentLang);
        });
    }

    function updateNavState(mod) {
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        if(mod === 'home') document.getElementById('nav-home').classList.add('active');
        if(mod === 'calc') document.getElementById('nav-calc').classList.add('active');
    }

    async function loadAndScroll(mod, elementId) {
        await loadContent(mod);
        setTimeout(() => {
            const el = document.getElementById(elementId);
            if(el) window.scrollTo({top: el.offsetTop - 70, behavior: 'smooth'});
        }, 400);
    }
</script>

</body>
</html>
