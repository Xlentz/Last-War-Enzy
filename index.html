<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Last War Enzy – by XLentz</title>
    
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg-dark: #0d0f11;
            --bg-panel: #161b22;
            --primary: #4ade80; 
            --accent: #fbbf24;  
            --text: #e2e8f0;
            --dim: #64748b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding-bottom: 80px;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* BOOT SCREEN */
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .boot-loader {
            width: 150px; height: 150px; border-radius: 20px;
            border: 2px solid var(--primary); box-shadow: 0 0 20px var(--primary);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.5; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0.5; transform: scale(0.95); } }

        /* HEADER */
        header {
            background: #161b22; padding: 15px; border-bottom: 2px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 1000;
        }
        .logo-text { font-weight: bold; letter-spacing: 2px; color: var(--primary); }

        /* SIDE MENU & DROPDOWNS */
        #sideMenu {
            position: fixed; left: -280px; top: 0; width: 260px; height: 100%;
            background: var(--bg-panel); z-index: 2000; transition: 0.3s;
            border-right: 1px solid var(--primary); overflow-y: auto; padding: 20px 10px;
        }
        #sideMenu.open { left: 0; }
        .menu-item { padding: 12px; border-bottom: 1px solid #2d3748; cursor: pointer; font-size: 0.85rem; text-transform: uppercase; }
        .menu-item:hover { color: var(--primary); }
        
        .menu-toggle::after { content: ' ▼'; font-size: 0.6rem; float: right; color: var(--dim); }
        .menu-toggle.open::after { content: ' ▲'; color: var(--primary); }
        
        .submenu { display: none; background: #0d0f11; border-left: 2px solid var(--dim); margin-left: 10px; }
        .submenu.open { display: block; animation: fadeIn 0.3s ease; }
        .submenu-item { padding: 10px 15px; font-size: 0.75rem; color: var(--dim); cursor: pointer; border-bottom: 1px dotted #2d3748; }
        .submenu-item:hover { color: var(--primary); background: #1f2937; }

        /* CONTENT AREA */
        .container { padding: 15px; max-width: 800px; margin: auto; min-height: 60vh; }
        #dynamic-content { animation: fadeIn 0.4s ease; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Styles for Dynamic Cards */
        .card { background: rgba(22, 27, 34, 0.9); border-left: 4px solid var(--primary); padding: 15px; margin-bottom: 20px; }
        .card.alert { border-left-color: var(--danger); }
        h2 { color: var(--accent); border-bottom: 1px solid var(--dim); padding-bottom: 5px; font-size: 1.1rem; text-transform: uppercase; }
        h3 { color: var(--primary); font-size: 0.95rem; margin-top: 0; }
        h4 { color: #fff; font-size: 0.85rem; margin-bottom: 5px; border-bottom: 1px dashed var(--dim); display: inline-block; }
        ul { padding-left: 20px; margin-top: 5px; }
        li { margin-bottom: 8px; font-size: 0.85rem; }
        p { font-size: 0.85rem; margin-top: 5px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin-top: 10px; margin-bottom: 15px; }
        th, td { border: 1px solid #2d3748; padding: 8px; text-align: left; }
        th { background: #1f2937; color: var(--accent); }
        strong { color: var(--accent); }

        /* BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; background: #161b22;
            display: flex; justify-content: space-around; padding: 10px 0;
            border-top: 1px solid var(--primary); z-index: 1000;
        }
        .nav-btn { color: var(--dim); font-size: 0.7rem; text-align: center; cursor: pointer; }
        .nav-btn.active { color: var(--primary); }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500; }
        .signature { text-align: center; font-size: 0.6rem; color: var(--dim); margin-top: 20px; }

        /* Loading Spinner */
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: var(--primary); animation: spin 1s linear infinite; margin: 40px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="boot-screen">
    <img src="apple-touch-icon.png" class="boot-loader" onerror="this.src='https://via.placeholder.com/150/000000/4ade80?text=LW+ENZY'">
    <p style="color: var(--primary); margin-top: 20px; font-family: monospace;">INITIALIZING SYSTEM...</p>
</div>

<div id="overlay" onclick="toggleMenu()"></div>

<div id="sideMenu">
    <h3 style="color: var(--primary); padding-left: 10px;">ENZY DATABASE</h3>
    <div class="menu-item" onclick="loadContent('home')">01. Home</div>
    <div class="menu-item" onclick="loadContent('basics')">02. Grundlagen</div>
    <div class="menu-item" onclick="loadContent('heroes')">03. Helden</div>
    <div class="menu-item" onclick="loadContent('build')">04. Gebäude</div>
    
    <div class="menu-item menu-toggle" id="toggle-s2" onclick="toggleSubmenu('sub-s2', this)">11. Season 2 (S2)</div>
    <div id="sub-s2" class="submenu">
        <div class="submenu-item" onclick="loadAndScroll('s2', 's2-intro')">11.1 Map & Verlauf</div>
        <div class="submenu-item" onclick="loadAndScroll('s2', 's2-mechanics')">11.2 Kohle & Frost-Debuffs</div>
        <div class="submenu-item" onclick="loadAndScroll('s2', 's2-heroes')">11.3 Helden & UR-Waffen</div>
        <div class="submenu-item" onclick="loadAndScroll('s2', 's2-research')">11.4 Forschungsbaum</div>
        <div class="submenu-item" onclick="loadAndScroll('s2', 's2-events')">11.5 S2 Events</div>
        <div class="submenu-item" onclick="loadAndScroll('s2', 's2-hive')">11.6 Hive & -19°C Trick</div>
    </div>

    <div class="menu-item" onclick="loadContent('calc')">17. Kalkulatoren</div>
</div>

<header>
    <div onclick="toggleMenu()" style="cursor:pointer; font-size: 1.5rem; color: var(--primary);">☰</div>
    <div class="logo-text">LAST WAR ENZY</div>
    <button onclick="toggleLang()" id="langBtn" style="background:none; border: 1px solid var(--primary); color: var(--primary); padding: 5px; cursor: pointer;">EN</button>
</header>

<div class="container">
    <div id="dynamic-content">
        <div class="spinner"></div>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-btn active" id="nav-home" onclick="loadContent('home')">🏠<br>HOME</div>
    <div class="nav-btn" onclick="toggleMenu()">☰<br>MENU</div>
    <div class="nav-btn" id="nav-s2" onclick="loadContent('s2')">❄️<br>S2</div>
</nav>

<script>
    let currentLang = 'de';
    let currentModule = 'home';

    // Start-Up
    window.addEventListener('DOMContentLoaded', () => {
        loadContent('home');
        setTimeout(() => {
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('boot-screen').style.display = 'none'; }, 500);
        }, 1200);
    });

    // Kernfunktion: Dynamic Loading
    async function loadContent(moduleName) {
        const contentDiv = document.getElementById('dynamic-content');
        currentModule = moduleName;
        
        // UI Feedback
        contentDiv.innerHTML = '<div class="spinner"></div>';
        updateNavState(moduleName);

        try {
            // Wir versuchen die Datei zu laden, z.B. content-s2.html
            const response = await fetch(`content-${moduleName}.html`);
            if (!response.ok) throw new Error('Modul nicht gefunden');
            
            const html = await response.text();
            contentDiv.innerHTML = html;
            
            // Nach dem Laden Sprache anpassen
            updateTexts();
            if (window.innerWidth < 900) toggleMenu(false);
            window.scrollTo(0,0);
        } catch (err) {
            // Fallback, falls Datei (noch) nicht existiert
            contentDiv.innerHTML = `
                <div class="card alert">
                    <h3>System Error</h3>
                    <p>Das Modul <strong>content-${moduleName}.html</strong> wurde nicht gefunden.</p>
                    <p>Bitte erstelle die Datei auf GitHub, um den Inhalt anzuzeigen.</p>
                </div>`;
        }
    }

    function updateTexts() {
        document.querySelectorAll('[data-de]').forEach(el => {
            const text = el.getAttribute('data-' + currentLang);
            if (text) el.innerHTML = text; 
        });
    }

    function toggleMenu(forceState) {
        const m = document.getElementById('sideMenu');
        const o = document.getElementById('overlay');
        const isOpening = forceState !== undefined ? forceState : !m.classList.contains('open');
        
        if(isOpening) { m.classList.add('open'); o.style.display = 'block'; }
        else { m.classList.remove('open'); o.style.display = 'none'; }
    }

    function toggleSubmenu(id, el) {
        document.getElementById(id).classList.toggle('open');
        el.classList.toggle('open');
    }

    function updateNavState(moduleName) {
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        if(moduleName === 'home') document.getElementById('nav-home').classList.add('active');
        if(moduleName === 's2') document.getElementById('nav-s2').classList.add('active');
    }

    async function loadAndScroll(moduleName, elementId) {
        await loadContent(moduleName);
        setTimeout(() => {
            const el = document.getElementById(elementId);
            if(el) {
                const y = el.getBoundingClientRect().top + window.scrollY - 80;
                window.scrollTo({top: y, behavior: 'smooth'});
            }
        }, 300);
    }

    function toggleLang() {
        currentLang = currentLang === 'de' ? 'en' : 'de';
        document.getElementById('langBtn').innerText = currentLang.toUpperCase();
        updateTexts();
    }
</script>

</body>
</html>
